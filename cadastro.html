<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar — Sentinel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-auth">
  <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>
  <header class="header" role="banner">
    <div class="header-inner">
      <a href="index.html" class="logo" aria-label="Sentinel"><span class="logo-bar" aria-hidden="true"></span>Sentinel</a>
      <nav class="nav" aria-label="Navegação principal"><ul role="list"><li><a href="index.html#sobre">Sobre</a></li><li><a href="index.html#contatos">Contatos</a></li></ul></nav>
      <a href="login.html" class="btn btn-dark">Entrar</a>
    </div>
  </header>
  <main id="main-content" class="auth-main">
    <div class="auth-card" role="region" aria-labelledby="cad-title">
      <h1 id="cad-title">Criar conta</h1>
      <div class="auth-form">
        <div class="field">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" autocomplete="name" placeholder="Seu nome" aria-required="true" />
          <span class="field-error" id="nome-error" role="alert" aria-live="polite"></span>
        </div>
        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" autocomplete="email" placeholder="seu@email.com" aria-required="true" />
          <span class="field-error" id="email-error" role="alert" aria-live="polite"></span>
        </div>
        <div class="field">
          <label for="senha">Senha</label>
          <div class="input-wrapper">
            <input type="password" id="senha" autocomplete="new-password" placeholder="Mínimo 8 caracteres" aria-required="true" aria-describedby="senha-hint" />
            <button type="button" class="toggle-pw" aria-label="Mostrar senha" aria-pressed="false" onclick="togglePw()"><span aria-hidden="true">👁</span></button>
          </div>
          <span id="senha-hint" class="field-hint">Use letras e números</span>
          <span class="field-error" id="senha-error" role="alert" aria-live="polite"></span>
        </div>
        <button type="button" class="btn btn-primary btn-full" onclick="handleCad()">Criar conta</button>
        <p class="auth-alt">Já tem conta? <a href="login.html">Entrar</a></p>
      </div>
    </div>
  </main>
  <script src="state.js"></script>
  <script>
    function togglePw() {
      const inp = document.getElementById('senha'), btn = document.querySelector('.toggle-pw');
      const hide = inp.type === 'password';
      inp.type = hide ? 'text' : 'password';
      btn.setAttribute('aria-label', hide ? 'Ocultar senha' : 'Mostrar senha');
      btn.setAttribute('aria-pressed', hide);
    }
    function handleCad() {
      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      ['nome','email','senha'].forEach(id => document.getElementById(id+'-error').textContent = '');
      let ok = true;
      if (!nome) { document.getElementById('nome-error').textContent = 'O nome é obrigatório.'; document.getElementById('nome').focus(); ok = false; }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('email-error').textContent = 'Informe um e-mail válido.'; if(ok) document.getElementById('email').focus(); ok = false; }
      if (!senha || senha.length < 8) { document.getElementById('senha-error').textContent = 'Mínimo 8 caracteres.'; if(ok) document.getElementById('senha').focus(); ok = false; }
      if (ok) {
        // Salva iniciais do usuário no estado
        setState(s => {
          const partes = nome.trim().split(' ');
          s.usuario = { nome, iniciais: (partes[0][0] + (partes[1] ? partes[1][0] : partes[0][1] || '')).toUpperCase() };
        });
        location.href = 'tarefas.html';
      }
    }
  </script>
</body>
</html>
