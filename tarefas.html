<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarefas — Sentinel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-app">
  <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar" aria-label="Menu lateral">
    <a href="index.html" class="logo logo--sidebar" aria-label="Sentinel"><span class="logo-bar" aria-hidden="true"></span>Sentinel</a>
    <nav class="sidebar-nav" aria-label="Navegação do sistema">
      <ul role="list">
        <li><a href="tarefas.html" class="sidebar-link active" aria-current="page"><span class="sidebar-icon" aria-hidden="true">⊞</span> Tarefas</a></li>
        <li><a href="projetos.html" class="sidebar-link"><span class="sidebar-icon" aria-hidden="true">◫</span> Projetos</a></li>
        <li><a href="estatisticas.html" class="sidebar-link"><span class="sidebar-icon" aria-hidden="true">▦</span> Estatísticas</a></li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sb-avatar" aria-hidden="true">He</div>
        <span class="user-name" id="sb-nome">Heidy de Sá</span>
      </div>
      <a href="login.html" class="btn-sair" aria-label="Sair da conta">SAIR</a>
    </div>
  </aside>

  <div class="topbar" role="banner">
    <button class="menu-toggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="sidebar" onclick="toggleMenu(this)"><span aria-hidden="true">☰</span></button>
    <span class="topbar-title">Sentinel</span>
  </div>

  <main id="main-content" class="app-main">
    <header class="app-header">
      <h1>Tarefas</h1>
      <nav aria-label="Navegação de contexto">
        <ul role="list" class="app-nav">
          <li><a href="index.html#sobre">Sobre</a></li>
          <li><a href="index.html#contatos">Contatos</a></li>
        </ul>
      </nav>
    </header>

    <!-- KPIs -->
    <section aria-labelledby="kpis-lbl">
      <h2 id="kpis-lbl" class="sr-only">Resumo</h2>
      <div class="kpis" role="list">
        <article class="kpi-card" role="listitem">
          <span class="kpi-label">Projetos ativos</span>
          <span class="kpi-value" id="kpi-projetos">—</span>
        </article>
        <article class="kpi-card" role="listitem">
          <span class="kpi-label">Tarefas em aberto</span>
          <span class="kpi-value" id="kpi-tarefas">—</span>
        </article>
      </div>
    </section>

    <!-- KANBAN -->
    <section aria-labelledby="kanban-lbl">
      <h2 id="kanban-lbl" class="sr-only">Quadro de tarefas</h2>
      <div class="kanban-wrap">
        <div class="kanban" id="kanban-board" role="list">
          <!-- renderizado via JS -->
        </div>
      </div>
    </section>
  </main>

  <!-- MODAL EDITAR TAREFA -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true">
    <div class="modal">
      <h2 id="modal-title">Editar tarefa</h2>
      <div class="auth-form">
        <input type="hidden" id="edit-id" />
        <div class="field">
          <label for="edit-titulo">Título</label>
          <input type="text" id="edit-titulo" placeholder="Nome da tarefa" />
        </div>
        <div class="field">
          <label for="edit-data">Data</label>
          <input type="date" id="edit-data" />
        </div>
        <div class="field">
          <label for="edit-economia">Economia (R$)</label>
          <input type="number" id="edit-economia" min="0" step="0.01" placeholder="0,00" />
        </div>
        <div class="field">
          <label for="edit-responsavel">Iniciais do responsável</label>
          <input type="text" id="edit-responsavel" maxlength="3" placeholder="Ex: He" />
          <span class="field-hint">Duas iniciais do nome do usuário que criou a tarefa</span>
        </div>
        <div class="field">
          <label for="edit-projeto">Projeto</label>
          <select id="edit-projeto"></select>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button type="button" class="btn btn-primary" onclick="saveEdit()">Salvar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="state.js"></script>
  <script>
    const COLUNAS = [
      { id: 'afazer',    label: 'A FAZER',    cls: 'afazer'     },
      { id: 'iniciado',  label: 'INICIADO',   cls: 'iniciado'   },
      { id: 'finalizado',label: 'FINALIZADO', cls: 'finalizado' },
      { id: 'espera',    label: 'EM ESPERA',  cls: 'espera'     },
    ];

    // ── RENDER ──────────────────────────────────────────────
    function render() {
      const s = getState();

      // KPIs
      document.getElementById('kpi-projetos').textContent = projetosAtivos(s).length;
      document.getElementById('kpi-tarefas').textContent  = tarefasAtivas(s).length;

      // Sidebar user
      document.getElementById('sb-avatar').textContent = s.usuario.iniciais;
      document.getElementById('sb-nome').textContent   = s.usuario.nome;

      // Board
      const board = document.getElementById('kanban-board');
      board.innerHTML = '';

      COLUNAS.forEach(col => {
        const cards = s.tarefas.filter(t => t.coluna === col.id);
        const colEl = document.createElement('div');
        colEl.className = 'kanban-col';
        colEl.setAttribute('role', 'listitem');
        colEl.setAttribute('aria-labelledby', `col-${col.id}`);

        colEl.innerHTML = `
          <div class="col-header">
            <h3 id="col-${col.id}" class="col-title col-title--${col.cls}">${col.label}</h3>
            <span class="col-count" aria-label="${cards.length} tarefas">${cards.length}</span>
          </div>
          <div class="kanban-cards" role="list" aria-label="Tarefas: ${col.label}">
            ${cards.length === 0 ? '<p class="empty-state">Nenhuma tarefa</p>' : cards.map(t => renderCard(t, s)).join('')}
          </div>
        `;
        board.appendChild(colEl);
      });

      // Fecha dropdowns abertos ao re-render
      document.querySelectorAll('.move-menu.open').forEach(m => m.classList.remove('open'));
    }

    function renderCard(t, s) {
      const proj = s.projetos.find(p => p.id === t.projetoId);
      const projNome = proj ? proj.nome : '—';
      const dataClass = isLate(t) ? 'task-date--late' : t.coluna === 'finalizado' ? 'task-date--done' : '';
      const outrosCols = COLUNAS.filter(c => c.id !== t.coluna);

      return `
        <article class="task-card" role="listitem" tabindex="0" aria-label="Tarefa: ${t.titulo}, ${projNome}">
          <h4 class="task-title">${esc(t.titulo)}</h4>
          <time class="task-date ${dataClass}" datetime="${t.data}">${formatDateDisplay(t.data)}</time>
          <p class="task-economy">Economia: <strong>${formatCurrency(t.economia)}</strong></p>
          <div class="task-footer">
            <span class="task-project">${esc(projNome)}</span>
            <span class="task-avatar" title="Responsável: ${esc(t.responsavel)}" aria-label="Responsável: ${esc(t.responsavel)}">${esc(t.responsavel)}</span>
          </div>
          <div class="task-actions">
            <div class="move-dropdown">
              <button class="btn-move" aria-haspopup="true" aria-expanded="false"
                onclick="toggleMoveMenu(event,'menu-${t.id}')" aria-label="Mover tarefa ${esc(t.titulo)}">
                ↕ Mover
              </button>
              <div class="move-menu" id="menu-${t.id}" role="menu" aria-label="Mover para coluna">
                ${outrosCols.map(c => `
                  <button role="menuitem" onclick="moveCard('${t.id}','${c.id}')">
                    → ${c.label}
                  </button>`).join('')}
              </div>
            </div>
            <button class="btn-edit" onclick="openEdit('${t.id}')" aria-label="Editar tarefa ${esc(t.titulo)}">✏ Editar</button>
          </div>
        </article>`;
    }

    function isLate(t) {
      if (t.coluna === 'finalizado') return false;
      return t.data && new Date(t.data) < new Date();
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── MOVER ────────────────────────────────────────────────
    function toggleMoveMenu(e, menuId) {
      e.stopPropagation();
      const menu = document.getElementById(menuId);
      const btn  = e.currentTarget;
      const isOpen = menu.classList.contains('open');
      // Fecha todos
      document.querySelectorAll('.move-menu.open').forEach(m => m.classList.remove('open'));
      document.querySelectorAll('.btn-move').forEach(b => b.setAttribute('aria-expanded','false'));
      if (!isOpen) {
        menu.classList.add('open');
        btn.setAttribute('aria-expanded','true');
      }
    }

    document.addEventListener('click', () => {
      document.querySelectorAll('.move-menu.open').forEach(m => m.classList.remove('open'));
      document.querySelectorAll('.btn-move').forEach(b => b.setAttribute('aria-expanded','false'));
    });

    function moveCard(tarefaId, novaColuna) {
      setState(s => {
        const t = s.tarefas.find(x => x.id === tarefaId);
        if (t) t.coluna = novaColuna;
      });
      const col = COLUNAS.find(c => c.id === novaColuna);
      showToast(`Movida para ${col.label}`, 'success');
      render();
    }

    // ── EDITAR ───────────────────────────────────────────────
    function openEdit(tarefaId) {
      const s = getState();
      const t = s.tarefas.find(x => x.id === tarefaId);
      if (!t) return;

      document.getElementById('edit-id').value          = t.id;
      document.getElementById('edit-titulo').value      = t.titulo;
      document.getElementById('edit-data').value        = t.data;
      document.getElementById('edit-economia').value    = t.economia;
      document.getElementById('edit-responsavel').value = t.responsavel;

      // Preenche select de projetos
      const sel = document.getElementById('edit-projeto');
      sel.innerHTML = s.projetos.map(p =>
        `<option value="${p.id}" ${p.id === t.projetoId ? 'selected' : ''}>${esc(p.nome)}</option>`
      ).join('');

      const overlay = document.getElementById('modal-overlay');
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden','false');
      document.getElementById('edit-titulo').focus();
    }

    function closeModal() {
      const overlay = document.getElementById('modal-overlay');
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden','true');
    }

    function saveEdit() {
      const id      = document.getElementById('edit-id').value;
      const titulo  = document.getElementById('edit-titulo').value.trim();
      const data    = document.getElementById('edit-data').value;
      const econ    = parseFloat(document.getElementById('edit-economia').value) || 0;
      const resp    = document.getElementById('edit-responsavel').value.trim();
      const projId  = document.getElementById('edit-projeto').value;

      if (!titulo) { document.getElementById('edit-titulo').focus(); return; }

      setState(s => {
        const t = s.tarefas.find(x => x.id === id);
        if (t) { t.titulo = titulo; t.data = data; t.economia = econ; t.responsavel = resp; t.projetoId = projId; }
      });
      closeModal();
      showToast('Tarefa atualizada!', 'success');
      render();
    }

    // Fechar modal com Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    // ── TOAST ────────────────────────────────────────────────
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast' + (type ? ' ' + type : '');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── MOBILE MENU ──────────────────────────────────────────
    function toggleMenu(btn) {
      const exp = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', !exp);
      document.getElementById('sidebar').classList.toggle('sidebar--open');
    }

    // ── INIT ─────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
