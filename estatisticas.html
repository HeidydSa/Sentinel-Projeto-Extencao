<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estatísticas — Sentinel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-app">
  <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>

  <aside class="sidebar" id="sidebar" aria-label="Menu lateral">
    <a href="index.html" class="logo logo--sidebar" aria-label="Sentinel"><span class="logo-bar" aria-hidden="true"></span>Sentinel</a>
    <nav class="sidebar-nav" aria-label="Navegação do sistema">
      <ul role="list">
        <li><a href="tarefas.html" class="sidebar-link"><span class="sidebar-icon" aria-hidden="true">⊞</span> Tarefas</a></li>
        <li><a href="projetos.html" class="sidebar-link"><span class="sidebar-icon" aria-hidden="true">◫</span> Projetos</a></li>
        <li><a href="estatisticas.html" class="sidebar-link active" aria-current="page"><span class="sidebar-icon" aria-hidden="true">▦</span> Estatísticas</a></li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sb-avatar" aria-hidden="true">He</div>
        <span class="user-name" id="sb-nome">Heidy de Sá</span>
      </div>
      <a href="login.html" class="btn-sair" aria-label="Sair da conta">SAIR</a>
    </div>
  </aside>

  <div class="topbar" role="banner">
    <button class="menu-toggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="sidebar" onclick="toggleMenu(this)"><span aria-hidden="true">☰</span></button>
    <span class="topbar-title">Sentinel</span>
  </div>

  <main id="main-content" class="app-main">
    <header class="app-header">
      <h1>Estatísticas</h1>
      <nav aria-label="Navegação de contexto">
        <ul role="list" class="app-nav">
          <li><a href="index.html#sobre">Sobre</a></li>
          <li><a href="index.html#contatos">Contatos</a></li>
        </ul>
      </nav>
    </header>

    <!-- Período -->
    <div class="periodo-filter" role="group" aria-labelledby="periodo-lbl">
      <span id="periodo-lbl" class="periodo-label-text">Período:</span>
      <div class="periodo-options">
        <button class="periodo-btn active" aria-pressed="true" onclick="setPeriodo(this)">Janeiro — Março</button>
        <button class="periodo-btn" aria-pressed="false" onclick="setPeriodo(this)">Abril — Junho</button>
        <button class="periodo-btn" aria-pressed="false" onclick="setPeriodo(this)">Julho — Setembro</button>
      </div>
    </div>

    <!-- KPIs -->
    <section aria-labelledby="estat-kpis-lbl">
      <h2 id="estat-kpis-lbl" class="sr-only">Indicadores</h2>
      <div class="kpis kpis--3" role="list">
        <article class="kpi-card" role="listitem">
          <span class="kpi-label">Projetos ativos</span>
          <span class="kpi-value" id="kpi-ativos">—</span>
        </article>
        <article class="kpi-card" role="listitem">
          <span class="kpi-label">Projetos finalizados</span>
          <span class="kpi-value" id="kpi-finalizados">—</span>
        </article>
        <article class="kpi-card" role="listitem">
          <span class="kpi-label">Economia total</span>
          <span class="kpi-value" id="kpi-economia">—</span>
        </article>
      </div>
    </section>

    <!-- GRÁFICO -->
    <section aria-labelledby="chart-lbl" class="chart-section">
      <h2 id="chart-lbl">Economia por projeto</h2>
      <div class="chart-wrap" id="chart-wrap"
        role="img"
        aria-label="Gráfico de barras com economia por projeto">
        <!-- renderizado via JS -->
      </div>
    </section>
  </main>

  <script src="state.js"></script>
  <script>
    function render() {
      const s = getState();
      document.getElementById('sb-avatar').textContent = s.usuario.iniciais;
      document.getElementById('sb-nome').textContent   = s.usuario.nome;

      // KPIs
      document.getElementById('kpi-ativos').textContent     = projetosAtivos(s).length;
      document.getElementById('kpi-finalizados').textContent = tarefasFinalizadas(s).length;
      document.getElementById('kpi-economia').textContent   = formatCurrency(economiaTotal(s));

      // Gráfico de barras por projeto
      const wrap = document.getElementById('chart-wrap');
      const projComEcon = s.projetos.map(p => ({
        nome: p.nome,
        econ: economiaPorProjeto(s, p.id)
      })).filter(p => p.econ > 0);

      if (projComEcon.length === 0) {
        wrap.innerHTML = '<p style="color:rgba(255,255,255,.5);text-align:center;padding:2rem;">Nenhum dado disponível.</p>';
        return;
      }

      const maxVal = Math.max(...projComEcon.map(p => p.econ), 1);

      // Descrição acessível
      const descricao = projComEcon.map(p => `${p.nome}: ${formatCurrency(p.econ)}`).join('; ');
      wrap.setAttribute('aria-label', `Economia por projeto — ${descricao}`);

      wrap.innerHTML = `
        <div class="chart-bars" aria-hidden="true">
          ${projComEcon.map((p,i) => {
            const pct = Math.round((p.econ / maxVal) * 100);
            const cls = i % 3 === 1 ? 'bar--2' : i % 3 === 2 ? 'bar--3' : '';
            return `
              <div class="bar-group">
                <div class="bar-group-title">${esc(p.nome)}</div>
                <div class="bars" style="justify-content:center">
                  <div class="bar ${cls}" style="--h:${pct}%;max-width:40px;flex:none;width:40px" title="${esc(p.nome)}: ${formatCurrency(p.econ)}">
                    <span class="bar-val">${formatCurrencyShort(p.econ)}</span>
                  </div>
                </div>
              </div>`;
          }).join('')}
        </div>
        <div class="chart-legend" aria-hidden="true">
          ${projComEcon.map((p,i) => {
            const cls = i % 3 === 1 ? 'legend-dot--2' : i % 3 === 2 ? 'legend-dot--3' : '';
            return `<span class="legend-item"><span class="legend-dot ${cls}"></span>${esc(p.nome)}</span>`;
          }).join('')}
        </div>`;
    }

    function formatCurrencyShort(v) {
      if (v >= 1000) return 'R$' + (v/1000).toFixed(1) + 'k';
      return 'R$' + v;
    }

    function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function setPeriodo(btn) {
      document.querySelectorAll('.periodo-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed','false'); });
      btn.classList.add('active'); btn.setAttribute('aria-pressed','true');
    }

    function toggleMenu(btn) {
      const exp = btn.getAttribute('aria-expanded')==='true';
      btn.setAttribute('aria-expanded',!exp);
      document.getElementById('sidebar').classList.toggle('sidebar--open');
    }

    render();
  </script>
</body>
</html>
