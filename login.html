<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Upscale Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-auth">
  <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>
  <header class="header" role="banner">
    <div class="header-inner">
      <a href="index.html" class="logo" aria-label="Upscale Solutions"><span class="logo-bar" aria-hidden="true"></span>Upscale Solutions</a>
      <nav class="nav" aria-label="Navegação principal"><ul role="list"><li><a href="index.html#sobre">Sobre</a></li><li><a href="index.html#contatos">Contatos</a></li></ul></nav>
      <a href="login.html" class="btn btn-dark" aria-current="page">Entrar</a>
    </div>
  </header>
  <main id="main-content" class="auth-main">
    <div class="auth-card" role="region" aria-labelledby="login-title">
      <h1 id="login-title">Acesse sua conta</h1>
      <div class="auth-form">
        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" autocomplete="email" placeholder="seu@email.com" aria-required="true" aria-describedby="email-hint" />
          <span id="email-hint" class="field-hint">Digite o e-mail cadastrado</span>
          <span class="field-error" id="email-error" role="alert" aria-live="polite"></span>
        </div>
        <div class="field">
          <label for="senha">Senha</label>
          <div class="input-wrapper">
            <input type="password" id="senha" autocomplete="current-password" placeholder="••••••••" aria-required="true" />
            <button type="button" class="toggle-pw" aria-label="Mostrar senha" aria-pressed="false" onclick="togglePw()"><span aria-hidden="true">👁</span></button>
          </div>
          <span class="field-error" id="senha-error" role="alert" aria-live="polite"></span>
        </div>
        <button type="button" class="btn btn-primary btn-full" onclick="handleLogin()">Entrar</button>
        <button type="button" class="btn btn-ghost btn-full" onclick="location.href='cadastro.html'">Cadastrar</button>
      </div>
    </div>
  </main>
  <script src="state.js"></script>
  <script>
    function togglePw() {
      const inp = document.getElementById('senha'), btn = document.querySelector('.toggle-pw');
      const hide = inp.type === 'password';
      inp.type = hide ? 'text' : 'password';
      btn.setAttribute('aria-label', hide ? 'Ocultar senha' : 'Mostrar senha');
      btn.setAttribute('aria-pressed', hide);
    }
    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      document.getElementById('email-error').textContent = '';
      document.getElementById('senha-error').textContent = '';
      let ok = true;
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('email-error').textContent = 'Informe um e-mail válido.';
        document.getElementById('email').focus(); ok = false;
      }
      if (!senha) {
        document.getElementById('senha-error').textContent = 'A senha é obrigatória.';
        if (ok) document.getElementById('senha').focus(); ok = false;
      }
      if (ok) location.href = 'tarefas.html';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
