<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar — Sentinel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../style.css" />
  </head>

  <body class="page-auth">
    <a href="#main-content" class="skip-link"
      >Pular para o conteúdo principal</a
    >
    <header class="header" role="banner">
      <div class="header-inner">
        <a href="../../index.html" class="logo" aria-label="Sentinel"
          ><span class="logo-bar" aria-hidden="true"></span>Sentinel</a
        >
        <nav class="nav" aria-label="Navegação principal">
          <ul role="list">
            <li><a href="../../index.html#sobre">Sobre</a></li>
            <li><a href="../../index.html#contatos">Contatos</a></li>
          </ul>
        </nav>
        <a href="login.html" class="btn btn-dark" aria-current="page">Entrar</a>
      </div>
    </header>
    <main id="main-content" class="auth-main">
      <div class="auth-card" role="region" aria-labelledby="login-title">
        <h1 id="login-title">Acesse sua conta</h1>
        <div class="auth-form">
          <div class="field">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              autocomplete="email"
              placeholder="seu@email.com"
              aria-required="true"
              aria-describedby="email-hint"
            />
            <span id="email-hint" class="field-hint"
              >Digite o e-mail cadastrado</span
            >
            <span
              class="field-error"
              id="email-error"
              role="alert"
              aria-live="polite"
            ></span>
          </div>
          <div class="field">
            <label for="senha">Senha</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="senha"
                autocomplete="current-password"
                placeholder="••••••••"
                aria-required="true"
              />
              <button
                type="button"
                class="toggle-pw"
                aria-label="Mostrar senha"
                aria-pressed="false"
                onclick="togglePw()"
              >
                <span aria-hidden="true">👁</span>
              </button>
            </div>
            <span
              class="field-error"
              id="senha-error"
              role="alert"
              aria-live="polite"
            ></span>
          </div>
          <button
            type="button"
            class="btn btn-primary-alt btn-full"
            onclick="handleLogin()"
          >
            Entrar
          </button>
          <button
            type="button"
            class="btn btn-primary-alt btn-full"
            onclick="location.href = '../cadastro/cadastro.html'"
          >
            Cadastrar
          </button>
        </div>
      </div>
    </main>
    <script type="module" src="login.js"></script>
  </body>
</html>
