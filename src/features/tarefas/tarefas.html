<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarefas — Sentinel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../style.css" />
  </head>

  <body class="page-app">
    <a href="#main-content" class="skip-link"
      >Pular para o conteúdo principal</a
    >

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar" aria-label="Menu lateral">
      <a
        href="../../index.html"
        class="logo logo--sidebar"
        aria-label="Sentinel"
        ><span class="logo-bar" aria-hidden="true"></span>Sentinel</a
      >
      <nav class="sidebar-nav" aria-label="Navegação do sistema">
        <ul role="list">
          <li>
            <a
              href="tarefas.html"
              class="sidebar-link active"
              aria-current="page"
              ><span class="sidebar-icon" aria-hidden="true">⊞</span> Tarefas</a
            >
          </li>
          <li>
            <a href="../projetos/projetos.html" class="sidebar-link"
              ><span class="sidebar-icon" aria-hidden="true">◫</span>
              Projetos</a
            >
          </li>
          <li>
            <a href="../estatisticas/estatisticas.html" class="sidebar-link"
              ><span class="sidebar-icon" aria-hidden="true">▦</span>
              Estatísticas</a
            >
          </li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="sb-avatar" aria-hidden="true">He</div>
          <span class="user-name" id="sb-nome">Heidy de Sá</span>
        </div>
        <a
          href="../login/login.html"
          class="btn-sair"
          aria-label="Sair da conta"
          >SAIR</a
        >
      </div>
    </aside>

    <div class="topbar" role="banner">
      <button
        class="menu-toggle"
        aria-label="Abrir menu"
        aria-expanded="false"
        aria-controls="sidebar"
        onclick="toggleMenu(this)"
      >
        <span aria-hidden="true">☰</span>
      </button>
      <span class="topbar-title">Sentinel</span>
    </div>

    <main id="main-content" class="app-main">
      <header class="app-header">
        <h1>Tarefas</h1>
        <nav aria-label="Navegação de contexto">
          <ul role="list" class="app-nav">
            <li><a href="../../index.html#sobre">Sobre</a></li>
            <li><a href="../../index.html#contatos">Contatos</a></li>
          </ul>
        </nav>
      </header>

      <!-- KPIs -->
      <section aria-labelledby="kpis-lbl">
        <h2 id="kpis-lbl" class="sr-only">Resumo</h2>
        <div class="kpis" role="list">
          <article class="kpi-card" role="listitem">
            <span class="kpi-label">Projetos ativos</span>
            <span class="kpi-value" id="kpi-projetos">—</span>
          </article>
          <article class="kpi-card" role="listitem">
            <span class="kpi-label">Tarefas em aberto</span>
            <span class="kpi-value" id="kpi-tarefas">—</span>
          </article>
        </div>
      </section>

      <!-- KANBAN -->
      <section aria-labelledby="kanban-lbl">
        <h2 id="kanban-lbl" class="sr-only">Quadro de tarefas</h2>
        <div class="kanban-wrap">
          <div class="kanban" id="kanban-board" role="list">
            <!-- renderizado via JS -->
          </div>
        </div>
      </section>
    </main>

    <!-- MODAL EDITAR TAREFA -->
    <div
      class="modal-overlay"
      id="modal-overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-hidden="true"
    >
      <div class="modal">
        <h2 id="modal-title">Editar tarefa</h2>
        <div class="auth-form">
          <input type="hidden" id="edit-id" />
          <div class="field">
            <label for="edit-titulo">Título</label>
            <input type="text" id="edit-titulo" placeholder="Nome da tarefa" />
          </div>
          <div class="field">
            <label for="edit-data">Data</label>
            <input type="date" id="edit-data" />
          </div>
          <div class="field">
            <label for="edit-economia">Economia (R$)</label>
            <input
              type="number"
              id="edit-economia"
              min="0"
              step="0.01"
              placeholder="0,00"
            />
          </div>
          <div class="field">
            <label for="edit-responsavel">Iniciais do responsável</label>
            <input
              type="text"
              id="edit-responsavel"
              maxlength="3"
              placeholder="Ex: He"
            />
            <span class="field-hint"
              >Duas iniciais do nome do usuário que criou a tarefa</span
            >
          </div>
          <div class="field">
            <label for="edit-projeto">Projeto</label>
            <select id="edit-projeto"></select>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">
            Cancelar
          </button>
          <button type="button" class="btn btn-primary" onclick="saveEdit()">
            Salvar
          </button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="../../../state.js"></script>
    <script src="tarefas.js"></script>
  </body>
</html>
