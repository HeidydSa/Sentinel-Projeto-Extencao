<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projetos — Upscale Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-app">
  <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>

  <aside class="sidebar" id="sidebar" aria-label="Menu lateral">
    <a href="index.html" class="logo logo--sidebar" aria-label="Upscale Solutions"><span class="logo-bar" aria-hidden="true"></span>Upscale Solutions</a>
    <nav class="sidebar-nav" aria-label="Navegação do sistema">
      <ul role="list">
        <li><a href="tarefas.html" class="sidebar-link"><span class="sidebar-icon" aria-hidden="true">⊞</span> Tarefas</a></li>
        <li><a href="projetos.html" class="sidebar-link active" aria-current="page"><span class="sidebar-icon" aria-hidden="true">◫</span> Projetos</a></li>
        <li><a href="estatisticas.html" class="sidebar-link"><span class="sidebar-icon" aria-hidden="true">▦</span> Estatísticas</a></li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sb-avatar" aria-hidden="true">He</div>
        <span class="user-name" id="sb-nome">Heidy de Sá</span>
      </div>
      <a href="login.html" class="btn-sair" aria-label="Sair da conta">SAIR</a>
    </div>
  </aside>

  <div class="topbar" role="banner">
    <button class="menu-toggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="sidebar" onclick="toggleMenu(this)"><span aria-hidden="true">☰</span></button>
    <span class="topbar-title">Upscale Solutions</span>
  </div>

  <main id="main-content" class="app-main">
    <header class="app-header">
      <h1>Projetos</h1>
      <nav aria-label="Navegação de contexto">
        <ul role="list" class="app-nav">
          <li><a href="index.html#sobre">Sobre</a></li>
          <li><a href="index.html#contatos">Contatos</a></li>
        </ul>
      </nav>
    </header>

    <section aria-labelledby="proj-lbl">
      <h2 id="proj-lbl" class="section-title">PROJETOS ATIVOS</h2>
      <div class="projetos-grid" id="projetos-grid" role="list">
        <!-- renderizado via JS -->
      </div>
    </section>
  </main>

  <script src="state.js"></script>
  <script>
    function render() {
      const s = getState();
      document.getElementById('sb-avatar').textContent = s.usuario.iniciais;
      document.getElementById('sb-nome').textContent   = s.usuario.nome;

      const grid = document.getElementById('projetos-grid');
      const ativos = projetosAtivos(s);

      if (ativos.length === 0) {
        grid.innerHTML = '<p class="empty-state">Nenhum projeto ativo.</p>';
        return;
      }

      grid.innerHTML = ativos.map(p => {
        const econ    = economiaPorProjeto(s, p.id);
        const tarefas = s.tarefas.filter(t => t.projetoId === p.id && t.coluna !== 'finalizado').length;
        const badgeCls = p.status === 'em produção' ? 'status-badge--producao' : 'status-badge--naoiniciado';
        const badgeTxt = p.status === 'em produção' ? 'Em produção' : 'Não iniciado';
        return `
          <article class="projeto-card" role="listitem" tabindex="0" aria-labelledby="p-${p.id}">
            <h3 id="p-${p.id}" class="projeto-nome">${esc(p.nome)}</h3>
            <dl class="projeto-info">
              <div><dt>Status</dt><dd><span class="status-badge ${badgeCls}">${badgeTxt}</span></dd></div>
              <div><dt>Economia total</dt><dd>${formatCurrency(econ)}</dd></div>
              <div><dt>Tarefas ativas</dt><dd>${tarefas}</dd></div>
            </dl>
          </article>`;
      }).join('');
    }

    function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function toggleMenu(btn) { const exp = btn.getAttribute('aria-expanded')==='true'; btn.setAttribute('aria-expanded',!exp); document.getElementById('sidebar').classList.toggle('sidebar--open'); }

    render();
  </script>
</body>
</html>
