<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastrar — Sentinel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../style.css" />
  </head>

  <body class="page-auth">
    <a href="#main-content" class="skip-link"
      >Pular para o conteúdo principal</a
    >
    <header class="header" role="banner">
      <div class="header-inner">
        <a href="../../index.html" class="logo" aria-label="Sentinel"
          ><span class="logo-bar" aria-hidden="true"></span>Sentinel</a
        >
        <nav class="nav" aria-label="Navegação principal">
          <ul role="list">
            <li><a href="../../index.html#sobre">Sobre</a></li>
            <li><a href="../../index.html#contatos">Contatos</a></li>
          </ul>
        </nav>
        <a href="../tarefas/tarefas.html" class="btn btn-dark">Entrar</a>
      </div>
    </header>
    <main id="main-content" class="auth-main">
      <div class="auth-card" role="region" aria-labelledby="cad-title">
        <h1 id="cad-title">Criar conta</h1>
        <div class="auth-form">
          <div class="field">
            <label for="nome">Nome *</label>
            <input
              type="text"
              id="nome"
              autocomplete="name"
              placeholder="Seu nome"
              aria-required="true"
            />
            <span
              class="field-error"
              id="nome-error"
              role="alert"
              aria-live="polite"
            ></span>
          </div>
          <div class="field">
            <label for="sobrenome">Sobrenome *</label>
            <input
              type="text"
              id="sobrenome"
              autocomplete="family-name"
              placeholder="Seu sobrenome"
              aria-required="true"
            />
            <span
              class="field-error"
              id="sobrenome-error"
              role="alert"
              aria-live="polite"
            ></span>
          </div>

          <div class="field">
            <label for="email">E-mail *</label>
            <input
              type="email"
              id="email"
              autocomplete="email"
              placeholder="seu@email.com"
              aria-required="true"
            />
            <span
              class="field-error"
              id="email-error"
              role="alert"
              aria-live="polite"
            ></span>
          </div>
          <div class="field">
            <label for="senha">Senha *</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="senha"
                autocomplete="new-password"
                placeholder="Mínimo 8 caracteres"
                aria-required="true"
                aria-describedby="senha-hint"
              />
              <button
                type="button"
                class="toggle-pw"
                aria-label="Mostrar senha"
                aria-pressed="false"
                onclick="togglePw('senha', this)"
              >
                <span aria-hidden="true">👁</span>
              </button>
            </div>
            <span id="senha-hint" class="field-hint">Use letras e números</span>
            <span
              class="field-error"
              id="senha-error"
              role="alert"
              aria-live="polite"
            ></span>
          </div>
          <div class="field">
            <label for="funcao">Função *</label>
            <div class="btn-funcao">
              <button
                type="button"
                class="btn btn-primary-alt btn-full"
                data-role="lider"
                id="lider"
                onclick="funcao(this)"
              >
                Líder
              </button>
              <button
                type="button"
                class="btn btn-primary-alt btn-full"
                data-role="dev"
                id="dev"
                onclick="funcao(this)"
              >
                Dev
              </button>
              <button
                type="button"
                class="btn btn-primary-alt btn-full"
                data-role="analista"
                id="analista"
                onclick="funcao(this)"
              >
                Finan
              </button>
              <button
                type="button"
                class="btn btn-primary-alt btn-full"
                data-role="admin"
                id="admin"
                style="display: none"
                onclick="funcao(this)"
              >
                Admin
              </button>
            </div>
            <span
              class="field-error"
              id="atributo-error"
              role="alert"
              aria-live="polite"
            ></span>
          </div>
        </div>
        <!-- SENHA ADMIN -->
        <div class="field">
          <label for="senha_adm">Senha do admin*</label>
          <div class="input-wrapper">
            <input type="password" id="senha_adm" />
            <span id="senha_adm-error" class="field-error"></span>
            <button
              type="button"
              class="toggle-pw"
              aria-label="Mostrar senha"
              aria-pressed="false"
              onclick="togglePw('senha_adm', this)"
            >
              <span aria-hidden="true">👁</span>
            </button>
          </div>
        </div>
        <div class="auth-alt">
          <button
            type="button"
            class="btn btn-primary-alt btn-full"
            onclick="handleCad()"
          >
            Criar conta
          </button>
        </div>
        <div class="auth-alt">
          <a class="btn btn-funcao-alt btn-full" href="../tarefas/tarefas.html"
            >Voltar</a
          >
        </div>
      </div>
    </main>
    <script type="module" src="cadastro.js"></script>
  </body>
</html>
